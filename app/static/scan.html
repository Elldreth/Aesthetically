<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Aesthetically — Score folder</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%235b8def'/%3E%3Ccircle cx='8' cy='8' r='3.5' fill='%2314151a'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/app.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; }
  #top { display: flex; gap: 8px; align-items: center; padding: 8px 16px;
         background: var(--surface); flex-wrap: wrap; }
  #scan-path { color: var(--text-dim); font-size: 13px; max-width: 40ch;
               overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #export-group { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  #exp-out { width: 220px; } #exp-top { width: 70px; }
  #grid { flex: 1; overflow-y: auto; display: grid; gap: 8px; padding: 8px;
          grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
          grid-auto-rows: 190px; align-content: start; }
  .cell { position: relative; height: 100%; border-radius: var(--radius-sm);
          overflow: hidden; background: #1a1c22; }
  .cell img { position: absolute; inset: 0; width: 100%; height: 100%;
              object-fit: cover; display: block; }
  .cell .score { position: absolute; left: 4px; top: 4px; background: rgba(0,0,0,.65);
                 border-radius: var(--radius-sm); padding: 1px 6px; font-size: 12px;
                 font-variant-numeric: tabular-nums; }
  .cell .name { position: absolute; left: 0; right: 0; bottom: 0; padding: 2px 6px;
                background: rgba(0,0,0,.55); font-size: 11px; color: var(--text-dim);
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #grid .empty-state { grid-column: 1 / -1; }
</style>
</head>
<body>
  <div id="top">
    <span class="badge" id="status">no scan yet</span>
    <span id="scan-path"></span>
    <button class="btn" id="b-more" hidden>Load more</button>
    <div id="export-group" hidden>
      <input id="exp-out" placeholder="export folder, e.g. D:\keepers" aria-label="Export folder">
      <label class="dim">top <input id="exp-top" type="number" value="50" min="1" aria-label="How many"></label>
      <select id="exp-mode" aria-label="Transfer mode">
        <option value="copy">copy</option><option value="link">hardlink</option>
        <option value="move">move</option>
      </select>
      <button class="btn btn-primary" id="b-export">Export</button>
    </div>
  </div>
  <div id="grid"></div>
<script src="/static/app.js"></script>
<script>
initNav(null);
helpOverlay([['?', 'Toggle this help']]);
const $ = id => document.getElementById(id);
const LIMIT = 60;
let shown = 0, total = 0, jobId = null;

function setStatus(kind, text) {
  const b = $('status');
  b.className = 'badge ' + kind; b.textContent = text;
}

async function poll() {
  const s = await api('/api/scan/status');
  $('scan-path').textContent = s.path || '';
  if (s.state === 'done') {
    setStatus('ok', `${s.count} images scored by ${s.model}`);
    $('export-group').hidden = false;
    if (jobId !== s.job_id) {           // results belong to a different scan — reset
      jobId = s.job_id; shown = 0; $('grid').textContent = '';
    }
    if (!shown) loadMore();
  } else if (s.state === 'failed') {
    setStatus('fail', 'scan failed — see server log');
  } else if (s.state === 'scoring' || s.state === 'starting') {
    setStatus('busy', `scoring… ${s.done || 0}/${s.total || '?'}`);
    setTimeout(poll, 1500);
  } else {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const h = document.createElement('h2');
    h.textContent = 'No scan yet';
    const p = document.createElement('p');
    p.textContent = 'Use "Score folder" in the header to predict your taste for any folder — nothing is added to your collection.';
    empty.append(h, p);
    $('grid').appendChild(empty);
  }
}

async function loadMore() {
  const data = await api(`/api/scan/results?limit=${LIMIT}&offset=${shown}`);
  total = data.total;
  jobId = data.job_id;
  for (const it of data.items) {
    const c = document.createElement('div');
    c.className = 'cell';
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.src = `/scan/img/${jobId}/${it.i}`;
    img.alt = it.name;
    const sc = document.createElement('span');
    sc.className = 'score';
    sc.textContent = it.score.toFixed(2);
    const nm = document.createElement('span');
    nm.className = 'name';
    nm.textContent = it.name;
    c.append(img, sc, nm);
    $('grid').appendChild(c);
  }
  shown += data.items.length;
  $('b-more').hidden = shown >= total;
}

$('b-more').addEventListener('click', loadMore);
$('b-export').addEventListener('click', async () => {
  const out = $('exp-out').value.trim();
  if (!out) return;
  $('b-export').disabled = true;
  try {
    const r = await api('/api/scan/export', {out, top: +$('exp-top').value, mode: $('exp-mode').value});
    toast(`Exported ${r.exported} images to ${r.out}`);
  } catch (e) { toast('Export failed: ' + e.message); }
  $('b-export').disabled = false;
});

poll();
</script>
</body>
</html>
