<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Aesthetically — grid triage</title>
<style>
  :root { --bg: #14151a; --panel: #1e2027; --text: #d8dae2; --dim: #7a7e8c; }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font: 14px/1.4 system-ui, sans-serif;
         height: 100vh; display: flex; flex-direction: column; }
  #top { display: flex; gap: 10px; align-items: center; padding: 8px 14px;
         background: var(--panel); flex-wrap: wrap; }
  #top a { color: #5b8def; text-decoration: none; }
  select, .btn { background: #3a3e4a; color: var(--text); border: 0; border-radius: 5px;
                 padding: 6px 12px; font-size: 13px; cursor: pointer; }
  .btn.nay { background: #6b3434; } .btn.yay { background: #2f5c3a; }
  .btn.maybe { background: #6b5a2a; }
  #info { color: var(--dim); margin-left: auto; }
  #grid { flex: 1; overflow-y: auto; display: grid; gap: 6px; padding: 8px;
          grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); align-content: start; }
  .cell { position: relative; border-radius: 5px; overflow: hidden; cursor: pointer;
          outline: 3px solid transparent; aspect-ratio: 1; background: #1a1c22; }
  .cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cell.sel { outline-color: #5b8def; }
  .cell .score { position: absolute; left: 5px; top: 5px; background: rgba(0,0,0,.65);
                 border-radius: 3px; padding: 1px 6px; font-size: 12px;
                 font-variant-numeric: tabular-nums; }
  kbd { background: #2a2d36; border-radius: 3px; padding: 0 5px; font-size: 12px; }
  #empty { grid-column: 1/-1; text-align: center; color: var(--dim); padding: 60px 0; }
</style>
</head>
<body>
  <div id="top">
    <a href="/">⟵ rate</a>
    <select id="mode">
      <option value="worst">predicted worst first</option>
      <option value="best">predicted best first</option>
      <option value="uncertain">most uncertain first</option>
      <option value="default">oldest first</option>
    </select>
    <button class="btn" id="b-all">select all</button>
    <button class="btn" id="b-none">clear</button>
    <button class="btn nay" id="b-nay">Nay selected <kbd>a</kbd></button>
    <button class="btn maybe" id="b-maybe">Maybe <kbd>w</kbd></button>
    <button class="btn yay" id="b-yay">Yay selected <kbd>d</kbd></button>
    <button class="btn" id="b-next">next page <kbd>n</kbd></button>
    <button class="btn" id="b-train">retrain model</button>
    <span id="info"></span>
  </div>
  <div id="grid"></div>
<script>
const LIMIT = 60;
let sessionId = null, offset = 0, items = [], selected = new Set();
const $ = id => document.getElementById(id);

async function api(path, body) {
  const res = await fetch(path, body === undefined ? {} : {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)});
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function load() {
  const data = await api(`/api/grid?mode=${$('mode').value}&limit=${LIMIT}&offset=${offset}`);
  items = data.items; selected.clear();
  const g = $('grid');
  g.innerHTML = '';
  if (!items.length) { g.innerHTML = '<div id="empty">nothing unrated here 🎉</div>'; }
  for (const it of items) {
    const c = document.createElement('div');
    c.className = 'cell'; c.dataset.id = it.id;
    c.innerHTML = `<img loading="lazy" src="/thumb/${it.id}">` +
      (it.score != null ? `<span class="score">${it.score.toFixed(2)}</span>` : '');
    c.onclick = () => { const id = it.id;
      selected.has(id) ? selected.delete(id) : selected.add(id);
      c.classList.toggle('sel'); updateInfo(); };
    g.appendChild(c);
  }
  $('info').textContent = `${data.total.toLocaleString()} unrated · showing ${offset + 1}–${offset + items.length}`;
  updateInfo();
}

function updateInfo() {
  const base = $('info').textContent.split(' · sel')[0];
  $('info').textContent = base + (selected.size ? ` · selected: ${selected.size}` : '');
}

async function bulk(value) {
  if (!selected.size) return;
  await api('/api/labels/bulk', {image_ids: [...selected], value, session_id: sessionId});
  load();
}

$('b-all').onclick = () => { selected = new Set(items.map(i => i.id));
  document.querySelectorAll('.cell').forEach(c => c.classList.add('sel')); updateInfo(); };
$('b-none').onclick = () => { selected.clear();
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('sel')); updateInfo(); };
$('b-nay').onclick = () => bulk(0);
$('b-maybe').onclick = () => bulk(0.5);
$('b-yay').onclick = () => bulk(1);
$('b-next').onclick = () => { offset += LIMIT; load(); };
$('mode').onchange = () => { offset = 0; load(); };
$('b-train').onclick = async () => {
  $('b-train').textContent = 'training…';
  try {
    const m = await api('/api/train_taste', {});
    alert(`trained ${m.model}\nval accuracy: ${m.val_accuracy}\nval AUC: ${m.val_auc}\n(on ${m.val_n} held-out images in ${m.val_clusters} clusters)`);
    offset = 0; load();
  } catch (e) { alert('training failed: ' + e.message); }
  $('b-train').textContent = 'retrain model';
};
document.addEventListener('keydown', e => {
  if (e.key === 'a') bulk(0);
  else if (e.key === 'w') bulk(0.5);
  else if (e.key === 'd') bulk(1);
  else if (e.key === 'n') { offset += LIMIT; load(); }
});

(async () => {
  sessionId = (await api('/api/sessions', {name: 'grid'})).session_id;
  load();
})();
</script>
</body>
</html>
