<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Aesthetically — Rate</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%235b8def'/%3E%3Ccircle cx='8' cy='8' r='3.5' fill='%2314151a'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/app.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #hud { display: flex; gap: 16px; align-items: center; padding: 8px 16px;
         background: var(--surface); font-variant-numeric: tabular-nums; }
  #hud .big { font-size: 16px; font-weight: 600; }
  #h-counts { display: flex; gap: 12px; align-items: center; }
  .stat { display: inline-flex; gap: 4px; align-items: center; color: var(--text-dim); }
  .stat b { color: var(--text); font-weight: 600; }
  #h-session { margin-left: auto; }
  #bar { height: 3px; background: var(--surface-2); flex: none; }
  #bar > div { height: 100%; width: 0; background: var(--accent); transition: width .2s; }
  #stage { flex: 1; display: flex; align-items: center; justify-content: center;
           min-height: 0; padding: 12px; position: relative; }
  #stage img { max-width: 100%; max-height: 100%; object-fit: contain;
               border-radius: var(--radius-sm); }
  #meta { position: absolute; left: 16px; bottom: 12px; max-width: calc(100% - 32px);
          width: fit-content; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
          background: rgba(0,0,0,.6); color: var(--text-dim); font-size: 12px;
          padding: 3px 8px; border-radius: var(--radius-sm); }
  #meta:empty { display: none; }
  #flash { position: absolute; top: 16px; right: 18px; font-size: 16px; font-weight: 600;
           font-variant-numeric: tabular-nums; background: rgba(0,0,0,.6);
           padding: 4px 10px; border-radius: var(--radius);
           opacity: 0; transition: opacity .4s; pointer-events: none; }
  #buttons { display: flex; gap: 8px; padding: 12px 16px 16px; background: var(--surface); }
  #buttons .btn { flex: 1; padding: 12px 0; font-size: 14px; font-weight: 600; }
  #buttons .btn.minor { flex: .45; font-weight: 400; }
</style>
</head>
<body>
  <div id="hud">
    <select id="mode" aria-label="Queue order">
      <option value="default">in order</option>
      <option value="uncertain">most uncertain</option>
      <option value="worst">predicted worst</option>
      <option value="best">predicted best</option>
    </select>
    <span class="big" id="h-pos">–</span>
    <span id="h-counts">
      <span class="stat" id="s-yay" title="rated Yay"><b>0</b></span>
      <span class="stat" id="s-maybe" title="rated Maybe"><b>0</b></span>
      <span class="stat" id="s-nay" title="rated Nay"><b>0</b></span>
      <span class="stat" id="s-excl" title="removed (broken or off-topic)" hidden><b>0</b></span>
    </span>
    <span class="meta" id="h-session"></span>
  </div>
  <div id="bar"><div id="bar-fill"></div></div>
  <div id="stage">
    <img id="view" alt="" hidden>
    <div id="done" class="empty-state" hidden>
      <h2>All caught up</h2>
      <p>Nothing left to rate in this queue. Try another queue order, or ingest more images.</p>
    </div>
    <div id="meta"></div>
    <div id="flash" aria-hidden="true"></div>
  </div>
  <div id="buttons">
    <button class="btn minor" id="b-undo" title="Undo last rating (z)">Undo <kbd>z</kbd></button>
    <button class="btn btn-nay" id="b-nay">Nay <kbd>a</kbd></button>
    <button class="btn btn-maybe" id="b-maybe">Maybe <kbd>w</kbd></button>
    <button class="btn btn-yay" id="b-yay">Yay <kbd>d</kbd></button>
    <button class="btn minor" id="b-skip" title="Skip for now (space)">Skip <kbd>space</kbd></button>
    <button class="btn minor" id="b-excl" title="broken or off-topic — not the same as dislike">Remove <kbd>x</kbd></button>
  </div>
<script src="/static/app.js"></script>
<script>
initNav('rate');
helpOverlay([
  ['a', 'Nay — dislike'],
  ['w', 'Maybe'],
  ['d', 'Yay — like'],
  ['space', 'Skip for now'],
  ['x', 'Remove (broken or off-topic — not the same as dislike)'],
  ['z', 'Undo last rating'],
  ['?', 'Toggle this help'],
]);

const PRELOAD = 5;
let sessionId = null;
let queue = [];          // [{id, width, height, prompt, model_hash}]
let history = [];        // undone-able: items we labeled, most recent last
let stats = {};
const $ = id => document.getElementById(id);

// stat icons (static strings from app.js — no user data)
$('s-yay').insertAdjacentHTML('afterbegin', ICONS.thumbsUp);
$('s-maybe').insertAdjacentHTML('afterbegin', ICONS.helpCircle);
$('s-nay').insertAdjacentHTML('afterbegin', ICONS.thumbsDown);
$('s-excl').insertAdjacentHTML('afterbegin', ICONS.x);

function preload() {
  queue.slice(1, 1 + PRELOAD).forEach(it => { (new Image()).src = '/img/' + it.id; });
}

function show() {
  const it = queue[0];
  $('view').hidden = !it; $('done').hidden = !!it;
  if (!it) { $('meta').textContent = ''; $('view').alt = ''; return; }
  $('view').src = '/img/' + it.id;
  $('view').alt = 'image ' + it.id;
  const bits = [];
  if (it.width) bits.push(it.width + '×' + it.height);
  if (it.model_hash) bits.push('model ' + it.model_hash);
  if (it.prompt) bits.push(it.prompt);
  $('meta').textContent = bits.join('  ·  ');
  preload();
}

function flash(txt, color) {
  const f = $('flash');
  f.textContent = txt; f.style.color = color; f.style.opacity = 1;
  setTimeout(() => f.style.opacity = 0, 250);
}

async function refill() {
  if (queue.length > PRELOAD) return;
  const data = await api('/api/queue?limit=40&mode=' + $('mode').value);
  const have = new Set(queue.map(i => i.id));
  const recent = new Set(history.slice(-20).map(h => h.item.id));
  for (const it of data.items)
    if (!have.has(it.id) && !recent.has(it.id)) queue.push(it);
}

function setStat(id, count) {
  $(id).querySelector('b').textContent = (count || 0).toLocaleString();
}

async function refreshStats() {
  stats = await api('/api/stats?session_id=' + sessionId);
  const done = stats.total - stats.unlabeled;
  $('h-pos').textContent = done.toLocaleString() + ' / ' + stats.total.toLocaleString();
  setStat('s-yay', stats.liked);
  setStat('s-maybe', stats.maybe);
  setStat('s-nay', stats.disliked);
  $('s-excl').hidden = !stats.excluded;
  setStat('s-excl', stats.excluded);
  $('h-session').textContent = 'session: ' + (stats.session_count || 0) +
    (stats.session_per_min ? ' · ' + stats.session_per_min + '/min' : '');
  $('bar-fill').style.width = (stats.total ? 100 * done / stats.total : 0) + '%';
}

async function rate(value) {
  const it = queue.shift();
  if (!it) return;
  show();                                   // advance immediately; network follows
  try {
    if (value === 'skip') { queue.push(it); }
    else if (value === 'exclude') {
      await api('/api/exclude', {image_id: it.id, session_id: sessionId});
      history.push({item: it});
      flash('Removed', 'var(--text-dim)');
    } else {
      await api('/api/label', {image_id: it.id, value, session_id: sessionId});
      history.push({item: it});
      const score = it.score != null ? ' · model: ' + it.score.toFixed(2) : '';
      flash((value === 1 ? 'Yay' : value === 0.5 ? 'Maybe' : 'Nay') + score,
            value === 1 ? 'var(--yay)' : value === 0.5 ? 'var(--maybe)' : 'var(--nay)');
    }
  } catch (e) { queue.unshift(it); show(); toast('Save failed: ' + e.message); return; }
  refreshStats(); refill();
}

async function undo() {
  if (!history.length) return;
  try {
    await api('/api/undo', {session_id: sessionId});
    const {item} = history.pop();
    queue.unshift(item);
    show(); flash('Undone', 'var(--accent)'); refreshStats();
  } catch (e) { toast('Undo failed: ' + e.message); }
}

document.addEventListener('keydown', e => {
  if (e.repeat || helpOverlayOpen()) return;
  if (e.key === 'd') rate(1);
  else if (e.key === 'w') rate(0.5);
  else if (e.key === 'a') rate(0);
  else if (e.key === ' ') { e.preventDefault(); rate('skip'); }
  else if (e.key === 'x') rate('exclude');
  else if (e.key === 'z') undo();
});
$('b-yay').addEventListener('click', () => rate(1));
$('b-maybe').addEventListener('click', () => rate(0.5));
$('b-nay').addEventListener('click', () => rate(0));
$('b-skip').addEventListener('click', () => rate('skip'));
$('b-excl').addEventListener('click', () => rate('exclude'));
$('b-undo').addEventListener('click', undo);

$('mode').addEventListener('change', async () => { queue = []; await refill(); show(); });

(async () => {
  sessionId = (await api('/api/sessions', {name: null})).session_id;
  const m = await api('/api/model');
  if (m.model) {
    $('mode').value = 'uncertain';   // active learning by default
    if (!localStorage.getItem('aesth_uncertain_toast')) {
      localStorage.setItem('aesth_uncertain_toast', '1');
      toast('Sorting by model uncertainty — your ratings teach it fastest here');
    }
  }
  await refill(); show(); refreshStats();
})();
</script>
</body>
</html>
