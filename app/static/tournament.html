<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Aesthetically — Tournament</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%235b8def'/%3E%3Ccircle cx='8' cy='8' r='3.5' fill='%2314151a'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/app.css">
<style>
  body { height: 100vh; display: flex; flex-direction: column; }
  #top { display: flex; gap: 12px; align-items: center; padding: 8px 16px;
         background: var(--surface); flex-wrap: wrap; }
  #hint { color: var(--text-dim); font-size: 13px; }
  #counters { margin-left: auto; display: flex; gap: 8px; }
  #board { flex: 1; display: grid; gap: 8px; padding: 12px;
           grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr);
           min-height: 0; }
  .cell { position: relative; border-radius: var(--radius); overflow: hidden; cursor: pointer;
          outline: 3px solid transparent; background: #1a1c22; }
  .cell:hover { outline-color: var(--accent); }
  .cell img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .cell .num { position: absolute; left: 8px; top: 8px; background: rgba(0,0,0,.7);
               border-radius: var(--radius-sm); padding: 2px 9px; font-size: 13px; font-weight: 600; }
  .cell.winner { outline-color: var(--yay); animation: win-pulse .25s ease-out; }
  @keyframes win-pulse {
    0% { outline-color: transparent; }
    50% { outline-color: var(--yay); outline-width: 5px; }
  }
  #board .empty-state { grid-column: 1 / -1; grid-row: 1 / -1; }
</style>
</head>
<body>
  <div id="top">
    <span id="hint">click the <b>best</b> image (or press its number) — every click ranks it above the other five</span>
    <button class="btn btn-quiet" id="b-skip">skip this set</button>
    <span id="counters">
      <span class="badge" id="b-screens" title="winner picks this session">screens: 0</span>
      <span class="badge" id="b-pairs" title="total pairwise comparisons recorded">pairs: 0</span>
    </span>
  </div>
  <div id="board"></div>
<script src="/static/app.js"></script>
<script>
initNav('tournament');
helpOverlay([
  ['1–6', 'Pick that image as the winner'],
  ['?', 'Toggle this help'],
]);

const SIZE = 6;
let sessionId = null, items = [], votes = 0, voting = false;
const $ = id => document.getElementById(id);
const delay = ms => new Promise(r => setTimeout(r, ms));

async function load() {
  const data = await api('/api/tournament?size=' + SIZE);
  items = data.items;
  const b = $('board');
  b.textContent = '';
  if (items.length < 2) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const h = document.createElement('h2');
    h.textContent = 'Not enough liked images';
    const p = document.createElement('p');
    p.textContent = 'The tournament ranks the images you already like — it needs at least 2 of them. Rate some images first.';
    const cta = document.createElement('a');
    cta.className = 'btn btn-primary';
    cta.href = '/';
    cta.textContent = 'Rate some images';
    empty.append(h, p, cta);
    b.appendChild(empty);
    return;
  }
  items.forEach((it, n) => {
    const c = document.createElement('div');
    c.className = 'cell';
    const img = document.createElement('img');
    img.src = '/img/' + it.id;
    img.alt = 'image ' + it.id;
    const num = document.createElement('span');
    num.className = 'num';
    num.textContent = n + 1;
    c.append(img, num);
    c.addEventListener('click', () => vote(it.id, c));
    b.appendChild(c);
  });
}

async function vote(winnerId, cell) {
  if (voting) return;
  voting = true;
  if (cell) cell.classList.add('winner');     // brief flash before the next set loads
  try {
    const work = (async () => {
      await api('/api/tournament', {
        winner_id: winnerId,
        loser_ids: items.map(i => i.id).filter(i => i !== winnerId),
        session_id: sessionId,
      });
      votes++;
      const rk = await api('/api/rankings?limit=1');
      $('b-screens').textContent = 'screens: ' + votes;
      $('b-pairs').textContent = 'pairs: ' + rk.pairs;
    })();
    await Promise.all([work, delay(250)]);
    await load();
  } catch (e) {
    if (cell) cell.classList.remove('winner');
    toast('Vote failed: ' + e.message);
  }
  voting = false;
}

$('b-skip').addEventListener('click', () => load());

document.addEventListener('keydown', e => {
  if (helpOverlayOpen()) return;
  const n = parseInt(e.key, 10);
  if (n >= 1 && n <= items.length)
    vote(items[n - 1].id, document.querySelectorAll('#board .cell')[n - 1]);
});

(async () => {
  sessionId = (await api('/api/sessions', {name: 'tournament'})).session_id;
  try {
    const rk = await api('/api/rankings?limit=1');
    $('b-pairs').textContent = 'pairs: ' + rk.pairs;
  } catch {}
  load();
})();
</script>
</body>
</html>
